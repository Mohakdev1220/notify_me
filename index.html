<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeSync</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --text: #e8eaf0;
    --text2: #8b90a8;
    --text3: #565c7a;
    --accent: #6c8fff;
    --accent-bg: #1a2340;
    --accent-dim: #3d5299;
    --success: #4ade80;
    --success-bg: #0d2e1a;
    --warning: #f59e0b;
    --danger: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app { width: 100%; max-width: 520px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo {
    font-size: 40px;
    margin-bottom: 10px;
  }
  .title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .title span { color: var(--accent); }
  .subtitle {
    font-size: 13px;
    color: var(--text2);
  }

  /* Big enable button */
  .enable-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .enable-btn:hover { background: #5a7aff; transform: translateY(-1px); }
  .enable-btn:disabled { background: var(--success); cursor: default; transform: none; }
  .enable-btn svg { width: 20px; height: 20px; }

  /* Status card */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .status-row:last-child { border-bottom: none; padding-bottom: 0; }
  .status-row:first-child { padding-top: 0; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.green { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
  .dot.yellow { background: var(--warning); }
  .dot.red { background: var(--danger); }
  .dot.grey { background: var(--text3); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-label { color: var(--text2); flex: 1; }
  .status-val { font-weight: 500; }
  .status-val.green { color: var(--success); }
  .status-val.yellow { color: var(--warning); }
  .status-val.red { color: var(--danger); }

  /* Next up */
  .next-card {
    background: var(--accent-bg);
    border: 1px solid var(--accent-dim);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    display: none;
  }
  .next-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .next-label { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .next-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .next-time { font-size: 13px; color: var(--text2); }
  .next-countdown { font-size: 32px; font-weight: 800; color: var(--accent); margin-top: 8px; letter-spacing: -1px; }

  /* Timeline */
  .timeline-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .timeline-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }
  .slot {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .slot.done { opacity: 0.35; }
  .slot.is-next { background: var(--accent-bg); }
  .slot.is-now { background: var(--success-bg); }
  .slot-time { font-size: 12px; font-weight: 600; color: var(--text3); width: 44px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .slot.is-next .slot-time { color: var(--accent); }
  .slot.is-now .slot-time { color: var(--success); }
  .slot-name { font-size: 13px; flex: 1; }
  .slot.is-now .slot-name { color: var(--success); font-weight: 500; }
  .badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-now { background: var(--success-bg); color: var(--success); border: 1px solid #1a4a2a; }
  .badge-next { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-dim); }
  .badge-done { background: var(--surface2); color: var(--text3); }

  /* Clock */
  .clock {
    text-align: center;
    font-size: 13px;
    color: var(--text3);
    margin-top: 8px;
  }
  .clock span { color: var(--text2); font-weight: 500; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 30px;
    color: var(--text3);
    font-size: 13px;
  }

  /* Toast */
  #toasts {
    position: fixed;
    bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 999;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    animation: slideIn 0.2s ease;
    max-width: 260px;
  }
  .toast.s { border-left: 3px solid var(--success); }
  .toast.w { border-left: 3px solid var(--warning); }
  .toast.i { border-left: 3px solid var(--accent); }
  @keyframes slideIn { from{transform:translateX(16px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>
<body>
  <a href="https://t.me/mohak12/2" 
   style="padding:12px 24px; background:#6c8fff; color:white; 
          border-radius:8px; text-decoration:none;">
  ⬇️ Download OfficeSync
</a> 

<div class="app">

  <div class="header">
    <div class="logo">📅</div>
    <div class="title">Office<span>Sync</span></div>
    <div class="subtitle" id="date-label">Loading...</div>
  </div>

  <!-- Enable button -->
  <button class="enable-btn" id="enable-btn" onclick="enableNotifications()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span id="enable-btn-text">Allow Notifications</span>
  </button>

  <!-- Status -->
  <div class="status-card">
    <div class="status-row">
      <div class="dot grey" id="dot-notif"></div>
      <span class="status-label">Notifications</span>
      <span class="status-val" id="val-notif">Off</span>
    </div>
    <div class="status-row">
      <div class="dot grey" id="dot-sync"></div>
      <span class="status-label">Supabase sync</span>
      <span class="status-val" id="val-sync">Not configured</span>
    </div>
    <div class="status-row">
      <div class="dot grey" id="dot-data"></div>
      <span class="status-label">Timetable</span>
      <span class="status-val" id="val-data">No data</span>
    </div>
  </div>

  <!-- Next up -->
  <div class="next-card" id="next-card">
    <div class="next-label">⏰ Up next</div>
    <div class="next-name" id="next-name">—</div>
    <div class="next-time" id="next-time-label">—</div>
    <div class="next-countdown" id="next-countdown">—</div>
  </div>

  <!-- Timeline -->
  <div class="timeline-card">
    <div class="timeline-title" id="timeline-title">Today's schedule</div>
    <div id="timeline"><div class="empty">No timetable loaded yet</div></div>
  </div>

  <div class="clock">Time: <span id="clock">—</span></div>

</div>

<div id="toasts"></div> 
  

<script>
// ── CONFIG — paste your Supabase details here ──────────────────────────
// You can also set these via URL params:
// ?url=https://xxx.supabase.co&key=eyJ...&device=smartboard
const CONFIG = {
  supabaseUrl:  'https://pumhjielzbnivhpftnrl.supabase.co',   // e.g. https://abcxyz.supabase.co
  supabaseKey:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1bWhqaWVsemJuaXZocGZ0bnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzcxOTEsImV4cCI6MjA5ODgxMzE5MX0.bRCE_UHikrPxI4T544LZ3x0giPhtwONB3tFbp86pzSE',   // anon/public key
  device:       'smartboard',  // device name in Supabase row
  notifBefore:  2,    // minutes before slot to notify
  pollInterval: 5000, // ms — how often to check Supabase
};
// ── END CONFIG ──────────────────────────────────────────────────────────

let timetable = {};
let notifEnabled = false;
let lastFiredKey = '';
let pollTimer = null;

// Read URL params (override CONFIG)
const params = new URLSearchParams(location.search);
if (params.get('url')) CONFIG.supabaseUrl = params.get('url');
if (params.get('key')) CONFIG.supabaseKey = params.get('key');
if (params.get('device')) CONFIG.device = params.get('device');
if (params.get('before')) CONFIG.notifBefore = parseInt(params.get('before'));

// ── Helpers ────────────────────────────────────────────────────────────
function toMins(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowMins() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function todayName() { return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()]; }

// ── Boot ───────────────────────────────────────────────────────────────
async function init() {
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(tick, 30000);

  // Load cached timetable
  const cached = localStorage.getItem('os_tt');
  if (cached) { try { timetable = JSON.parse(cached); renderTimeline(); } catch {} }

  // Check notification permission
  if (Notification.permission === 'granted') {
    notifEnabled = true;
    updateNotifStatus(true);
  }

  // Start Supabase polling
  if (CONFIG.supabaseUrl && CONFIG.supabaseKey) {
    startPolling();
  } else {
    setStatus('sync', 'grey', 'Not configured', '');
  }

  await registerSW();
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

// ── Supabase polling ───────────────────────────────────────────────────
function startPolling() {
  setStatus('sync', 'yellow', 'Connecting...', '');
  fetchData();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(fetchData, CONFIG.pollInterval);
}

async function fetchData() {
  try {
    const url = `${CONFIG.supabaseUrl}/rest/v1/officesync_timetable?device=eq.${encodeURIComponent(CONFIG.device)}&select=data,updated_at&order=updated_at.desc&limit=1`;
    const res = await fetch(url, {
      headers: { 'apikey': CONFIG.supabaseKey, 'Authorization': `Bearer ${CONFIG.supabaseKey}` }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!rows.length) {
      setStatus('sync', 'yellow', 'Connected — no data', '');
      setStatus('data', 'grey', 'No row found', '');
      return;
    }
    const newStr = rows[0].data;
    const newTT = JSON.parse(newStr);
    const changed = JSON.stringify(newTT) !== JSON.stringify(timetable);
    timetable = newTT;
    localStorage.setItem('os_tt', newStr);
    setStatus('sync', 'green', 'Live ✓', 'green');
    const days = Object.keys(timetable).length;
    setStatus('data', 'green', `${days} days loaded`, 'green');
    if (changed) { renderTimeline(); toast('Timetable updated', 's'); }
    tick();
  } catch(e) {
    setStatus('sync', 'red', 'Error — retrying', 'red');
  }
}

// ── Tick — check notifications ─────────────────────────────────────────
function tick() {
  renderTimeline();
  if (!notifEnabled) return;
  const slots = timetable[todayName()] || [];
  const now = nowMins();
  slots.forEach(s => {
    const diff = toMins(s.startTime) - now;
    if (diff === CONFIG.notifBefore) {
      const msg = s.notificationMessage || (s.label + ' in ' + CONFIG.notifBefore + ' min');
      fire('⏰ ' + msg, 'Starts at ' + s.startTime, s.startTime + '-pre');
    }
    if (diff === 0) {
      const msg2 = s.notificationMessage ? s.notificationMessage.replace('Next period', 'NOW') : (s.label + ' — starting now!');
      fire('📢 ' + msg2, "It's " + s.startTime, s.startTime + '-now');
    }
  });
}

function fire(title, body, key) {
  if (lastFiredKey === key) return;
  lastFiredKey = key;
  new Notification(title, { body, icon: './icon.png', tag: key, requireInteraction: false });
}

// ── Render timeline ────────────────────────────────────────────────────
function renderTimeline() {
  const day = todayName();
  const slots = timetable[day] || [];
  const now = nowMins();

  document.getElementById('timeline-title').textContent = `${day}'s schedule`;

  if (!slots.length) {
    document.getElementById('timeline').innerHTML = `<div class="empty">No slots found for ${day}</div>`;
    document.getElementById('next-card').style.display = 'none';
    return;
  }

  const nextSlot = slots.find(s => toMins(s.startTime) > now);

  // Next card
  const nc = document.getElementById('next-card');
  if (nextSlot) {
    nc.style.display = 'block';
    document.getElementById('next-name').textContent = nextSlot.label;
    const diff = toMins(nextSlot.startTime) - now;
    document.getElementById('next-time-label').textContent = `Starts at ${nextSlot.startTime}`;
    document.getElementById('next-countdown').textContent = diff === 1 ? '1 min away' : `${diff} mins away`;
  } else {
    nc.style.display = 'none';
  }

  // Timeline rows
  document.getElementById('timeline').innerHTML = slots.map(s => {
    const smins = toMins(s.startTime);
    const isNow = smins <= now && smins > now - 45;
    const isNext = nextSlot && s.startTime === nextSlot.startTime;
    const isDone = smins < now && !isNow;
    const cls = isNow ? 'is-now' : isNext ? 'is-next' : isDone ? 'done' : '';
    const badge = isNow ? '<span class="badge badge-now">Now</span>'
                : isNext ? '<span class="badge badge-next">Next</span>'
                : isDone ? '<span class="badge badge-done">Done</span>' : '';
    return `<div class="slot ${cls}">
      <span class="slot-time">${s.startTime}</span>
      <span class="slot-name">${s.label}</span>
      ${badge}
    </div>`;
  }).join('');
}

// ── Notifications ──────────────────────────────────────────────────────
async function enableNotifications() {
  if (Notification.permission === 'granted') {
    notifEnabled = true;
    updateNotifStatus(true);
    toast('Already enabled!', 's');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notifEnabled = true;
    updateNotifStatus(true);
    toast('Notifications enabled! ✓', 's');
    tick();
  } else {
    toast('Permission denied — allow in browser bar', 'w');
  }
}

function updateNotifStatus(on) {
  setStatus('notif', on ? 'green' : 'grey', on ? 'Enabled ✓' : 'Off', on ? 'green' : '');
  const btn = document.getElementById('enable-btn');
  const txt = document.getElementById('enable-btn-text');
  if (on) {
    btn.disabled = true;
    txt.textContent = '✓ Notifications Active';
  }
}

// ── Service worker ─────────────────────────────────────────────────────
async function registerSW() {
  if ('serviceWorker' in navigator) {
    try { await navigator.serviceWorker.register('./sw.js'); } catch(e) {}
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────
function setStatus(id, dotColor, text, textColor) {
  const dot = document.getElementById('dot-' + id);
  const val = document.getElementById('val-' + id);
  dot.className = 'dot ' + dotColor;
  val.textContent = text;
  val.className = 'status-val ' + (textColor || '');
}

function toast(msg, type='i') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Start ──────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
